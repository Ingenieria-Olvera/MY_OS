name: my_os
description: "MY OS — OA's offline-first life operating system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local filesystem access — reading the .md vault
  path_provider: ^2.1.5

  # Storage Access Framework — lets the user pick the synced vault folder
  # once and grants persisted access to just that folder, so the app never
  # needs broad storage permissions.
  saf_util: any
  saf_stream: any

  # Market Data (Using http to fetch from Yahoo Finance API directly, and to
  # talk to the local Ollama agent over the home network)
  http: ^1.2.0

  # Local reminders for due todos and time-sensitive emails/calendar events.
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0

  # Samsung Health / Google Fit — Health Connect access has to happen
  # on-device, so unlike Calendar/Slack/Gmail this isn't moved to a Python
  # scraper.
  health: ^11.0.0

  # Local persistence: digest read-state, todo completion, financial goal
  # overrides, chat history. Google Calendar is now read from
  # calendar_digest.json (written by python/calendar_scraper.py) instead of
  # a live in-app OAuth call, so google_sign_in/googleapis are no longer
  # needed here.
  shared_preferences: ^2.2.3

  # Render plain-text Markdown from the vault
  flutter_markdown: ^0.7.6

  # Lightweight state management
  provider: ^6.1.2

  # Premium typography
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # SHA-1 for todo ids that match python/todos_aggregator.py's hashing, so
  # manually-added todos don't show up twice once the scraper picks them up.
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_android: 2.2.14
